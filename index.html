<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💍</text></svg>">
    <title>ZW - Wishes &amp; RSVP</title>

    <!-- Resource hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />

    <!-- Stylesheet -->
    <link rel="preload" as="style" href="css/style.css" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="css/style.css" /></noscript>

    <!-- Fonts -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Cormorant+Garamond:wght@500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Cormorant+Garamond:wght@500;600;700&display=swap" /></noscript>

    <!-- Font Awesome -->
    <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" /></noscript>

    <!-- JavaScript: config first, then main script -->
    <script defer src="js/config.js"></script>
    <script defer src="js/script.js"></script>
</head>
<body>

<!-- ====== DECOR ====== -->
<div class="bokeh-wrap" aria-hidden="true">
    <div class="bokeh b1"></div>
    <div class="bokeh b2"></div>
    <div class="bokeh b3"></div>
    <div class="bokeh b4"></div>
</div>
<div class="petals-wrap" aria-hidden="true">
    <div class="petal p1"></div>
    <div class="petal p2"></div>
    <div class="petal p3"></div>
    <div class="petal p4"></div>
    <div class="petal p5"></div>
    <div class="petal p6"></div>
    <div class="petal p7"></div>
    <div class="petal p8"></div>
    <div class="petal p9"></div>
    <div class="petal p10"></div>
</div>

    <!-- ====== TOPBAR ====== -->
    <header class="topbar">
        <div class="brand" id="brandContainer">
            <span id="brideName">Zwageri</span>
            <i class="fas fa-heart" aria-hidden="true"></i>
            <span id="groomName">Lily</span>
        </div>
        <button id="theme-toggle" aria-label="Toggle theme">
            <i class="fas fa-moon" aria-hidden="true"></i>
            <span class="toggle-label">Dark</span>
        </button>
    </header>

    <!-- ====== MAIN CONTENT ====== -->
    <main class="page-wrap">
        <div class="hero">
            <p id="greeting" class="greeting"></p>
            <h1 id="heroTitle">Bagikan Ucapan &amp; Doa Terbaikmu</h1>
        </div>

        <div class="grid">

            <!-- ====== FORM COLUMN ====== -->
            <section class="form-col">
                <div class="card form-card">
                    <div class="form-header">
                        <h2>Send your <span>Wish</span></h2>
                        <p id="formSubtitle">Ucapan dan doa terbaik untuk Zwageri dan Lily</p>
                    </div>

                    <form id="contactForm" novalidate>
                        <!-- Name -->
                        <div class="form-group">
                            <label for="form-name">Nama</label>
                            <input type="text" id="form-name" name="name" class="field" placeholder="John Doe" required maxlength="20" autocomplete="off" />
                        </div>

                        <!-- RSVP -->
                        <div class="form-group">
                            <label for="rsvp">RSVP</label>
                            <div class="select-wrap">
                                <select id="rsvp" name="rsvp" class="field" required>
                                    <option value="" disabled selected>— Rencana Kehadiran —</option>
                                    <option value="Hadir">Insyaa Allah Hadir</option>
                                    <option value="Belum dapat Hadir">Belum dapat Hadir</option>
                                </select>
                                <i class="fas fa-chevron-down" aria-hidden="true"></i>
                            </div>
                        </div>

                        <!-- Message -->
                        <div class="form-group">
                            <label for="form-message">Pesan</label>
                            <textarea id="form-message" name="message" class="field" placeholder="Barakallahu lakuma wa baraka 'alaikuma wa jama'a bainakuma fii khair~" required maxlength="300"></textarea>
                            <div id="msg-counter" class="counter">0 / 300</div>
                        </div>

                        <!-- Anti‑spam fields -->
                        <div class="form-group" style="display:none;">
                            <label for="honeypot">Leave this empty</label>
                            <input type="text" id="honeypot" name="honeypot" value="" />
                        </div>
                        <input type="hidden" id="formLoadTime" name="formLoadTime" value="" />
                        <input type="hidden" id="humanFlag" name="humanFlag" value="" />

                        <!-- Submit button -->
                        <button type="submit" class="btn submit-btn" id="submitBtn">
                            <i class="fas fa-paper-plane" aria-hidden="true"></i>
                            <span id="submitText">Kirim</span>
                            <span id="submitSpinner" style="display:none;"><i class="fas fa-spinner fa-spin"></i></span>
                        </button>
                    </form>

                    <div id="formStatus"></div>

                    <!-- Privacy notice -->
                    <div class="privacy-notice">
                        <i class="fas fa-shield-alt" aria-hidden="true"></i>
                        Pesan yang Anda kirimkan kami simpan di Google Sheet pribadi sebagai kenang-kenangan&#128522
                    </div>
                </div>
            </section>

            <!-- ====== MESSAGES COLUMN ====== -->
            <section class="messages-col">
                <div class="card messages-card">
                    <div class="messages-header" id="messages-header">
                        <h2 id="messages-title"><i class="fas fa-envelope"></i> Wishes</h2>
                        <span class="messages-count" id="messages-count">0 pesan</span>
                    </div>

                    <div class="message-list-wrap" id="message-list-wrap">
                        <div class="message-list" id="message-list"></div>
                    </div>

                    <div class="pagination" id="pagination"></div>
                </div>
            </section>

        </div>
    </main>

    <!-- ====== TOASTS ====== -->
    <div class="toast-container" id="toastContainer">
        <div class="toast" id="unsendToast">
            <div class="toast-msg">
                <i class="fas fa-paper-plane" aria-hidden="true"></i>
                <span>Pesan terkirim</span>
            </div>
            <span class="toast-timer" id="toastTimer">20</span>
            <button class="toast-btn" id="unsendBtn">Batalkan</button>
        </div>
        <div class="toast" id="notificationToast">
            <div class="toast-msg">
                <i class="fas fa-info-circle" aria-hidden="true"></i>
                <span id="notificationText">Notifikasi</span>
            </div>
        </div>
    </div>

    <footer>©2026 Lorem Ipsum • <span class="js-brideName">Lily</span> <i class="fas fa-heart" aria-hidden="true"></i> <span class="js-groomName">Zwageri</span></footer>
</body>
</html>
